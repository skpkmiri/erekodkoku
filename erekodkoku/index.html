<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eKOKU LIVE - SKPK MIRI</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel untuk JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- html2pdf.js untuk Simpan PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @media print { 
            .print\:hidden { display: none !important; } 
            body { background: white !important; padding: 0 !important; margin: 0 !important; } 
            @page { size: A4 portrait; margin: 10mm; }
            .break-inside-avoid { page-break-inside: avoid; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            
            .single-page-print {
                max-height: 275mm !important;
                overflow: hidden !important;
                box-sizing: border-box !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            .single-page-print table {
                font-size: 9px !important;
                line-height: 1.1 !important;
            }
            .single-page-print th, .single-page-print td {
                padding: 3px 4px !important;
            }
            .single-page-print h2, .single-page-print h3 {
                font-size: 14px !important;
                margin-top: 2px !important;
                margin-bottom: 2px !important;
            }
            .single-page-print .card-hide-print {
                display: none !important;
            }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .signature-pad { touch-action: none; cursor: crosshair; }
        #pdf-content { background: white; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">
    <div id="root">
        <div class="h-screen flex items-center justify-center bg-slate-900 text-white font-bold text-center p-4">
            <div>
                <div class="text-4xl mb-4 animate-bounce">🚀</div>
                <p class="tracking-widest uppercase text-xs font-black">Menyambung ke Cloud Firebase...</p>
                <p class="text-[10px] opacity-40 mt-2">SILA TUNGGU SEBENTAR</p>
            </div>
        </div>
    </div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
        import { getFirestore, initializeFirestore, collection, doc, setDoc, addDoc, onSnapshot, query, orderBy, updateDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';

        const { useState, useMemo, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDXh_xTy18MAeWNex2pAbxIU1GmPKFo2pg",
            authDomain: "ekoku-skpk-miri.firebaseapp.com",
            projectId: "ekoku-skpk-miri",
            storageBucket: "ekoku-skpk-miri.firebasestorage.app",
            messagingSenderId: "207059132138",
            appId: "1:207059132138:web:a36f8d2ce00d91806bc193",
            measurementId: "G-4FYQE25KRK"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = initializeFirestore(app, { experimentalForceLongPolling: true });
        const appId = 'ekoku-skpk-miri';

        const Icons = {
            PenTool: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>,
            Users: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>,
            ClipboardList: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path></svg>,
            Archive: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="21 8 21 21 3 21 3 8"></polyline><rect x="1" y="3" width="22" height="5"></rect></svg>,
            PieChart: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>,
            Printer: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>,
            Settings: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>,
            Edit: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>,
            Trash: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Download: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        };

        const PIKEBM_OPTS = [
            '', 'Akhbar Pembuka Minda', 'Akulah Jaguh', 'Bina Kata', 'Bisik-bisik Sayang', 'Burung Tiung', 'Cakna Mata', 'Cef Cilik', 'Cuit-cuit Fikir', 
            'DJ Hatiku', 'Fikir-fikirkan', 'Getaran Bahasa', 'Hai Haiku', 'Jika Maka', 'Jualan Langsung', 'Kukunci', 'Langkah Demi Langkah Sayang', 
            'Madah Berirama', 'Pentas Aksi', 'Pintar Bahasa', 'Profesor Serba Tahu', 'Sahutlah Panggilanku', 'Sorak Berentak', 'Stesen ke Stesen', 
            'Suluh Pedoman', 'Tak Kenal Maka Tak Cinta', 'Teka Kata Pilihan', 'Telefon Cikgu', 'Terampil dan Teladan', 'Tiga Perkataan', 'Usahawan Muda'
        ];

        const compressImage = (base64Str, maxWidth = 600) => {
            return new Promise((resolve) => {
                const img = new Image(); img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const scale = maxWidth / img.width;
                    canvas.width = maxWidth; canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                };
            });
        };

        const parseCSV = (str) => {
            if (!str) return []; const arr = []; let quote = false; let row = 0, col = 0, c = 0;
            for (; c < str.length; c++) {
                let cc = str[c], nc = str[c+1]; arr[row] = arr[row] || []; arr[row][col] = arr[row][col] || '';
                if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
                if (cc == '"') { quote = !quote; continue; }
                if (cc == ',' && !quote) { ++col; continue; }
                if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc == '\n' && !quote) { ++row; col = 0; continue; }
                if (cc == '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            return arr;
        };

        const fetchCSVData = async (rawUrl) => {
            if (!rawUrl) return null; const url = rawUrl.trim();
            const proxies = [`https://corsproxy.io/?${encodeURIComponent(url)}`, `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`, url];
            for (let proxy of proxies) {
                try { const res = await fetch(proxy); if (res.ok) { const text = await res.text(); if (text && !text.trim().startsWith('<!doctype')) return text; } } catch (e) { console.warn("Proxy failed..."); }
            }
            throw new Error('Gagal muat turun data dari Google Sheets.');
        };

        const formatDate = (dateString) => {
            if (!dateString) return '';
            const parts = dateString.split('-');
            if (parts.length === 3) {
                const [year, month, day] = parts;
                return `${day}/${month}/${year}`;
            }
            return dateString;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [currentView, setCurrentView] = useState('laporan_baru');
            const [editingReport, setEditingReport] = useState(null);
            const [toast, setToast] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [reports, setReports] = useState([]);
            const [attendanceRecords, setAttendanceRecords] = useState([]);
            const [students, setStudents] = useState([]);
            const [teachers, setTeachers] = useState([]);
            const [activities, setActivities] = useState(['MENGAMBIL DATA...']);
            const [csvLinkMurid, setCsvLinkMurid] = useState('https://docs.google.com/spreadsheets/d/e/2PACX-1vRyXz6iABc4zz0gpRMqo0xgzZtUmw9BSwkrbYq2Mc0c0hcnwg-pZTIm9XE1S2g5B_4wnblhRSAiO28V/pub?gid=0&single=true&output=csv');
            const [csvLinkGuru, setCsvLinkGuru] = useState('https://docs.google.com/spreadsheets/d/e/2PACX-1vRyXz6iABc4zz0gpRMqo0xgzZtUmw9BSwkrbYq2Mc0c0hcnwg-pZTIm9XE1S2g5B_4wnblhRSAiO28V/pub?gid=33896881&single=true&output=csv');

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

            useEffect(() => {
                const initAuth = async () => { 
                    try { 
                        await signInAnonymously(auth); 
                    } catch (e) { 
                        console.error("Firebase Auth Error:", e); 
                        showToast("Ralat Pengesahan Cloud. Sila muat semula halaman.");
                    } 
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, u => { 
                    setUser(u); 
                    if (u) setIsLoading(false); 
                }, (error) => {
                    console.error("Auth State Error:", error);
                    showToast("Ralat Sesi. Sila muat semula.");
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                
                let unsubConfig, unsubReports, unsubAttendance;

                try {
                    unsubConfig = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config'), d => {
                        if (d.exists()) { const data = d.data(); if (data.csvLinkMurid) setCsvLinkMurid(data.csvLinkMurid); if (data.csvLinkGuru) setCsvLinkGuru(data.csvLinkGuru); }
                    }, (error) => console.error("Config Snapshot Error:", error));

                    unsubReports = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'reports'), s => {
                        setReports(s.docs.map(d => ({ ...d.data(), id: d.id })).sort((a,b) => b.timestamp - a.timestamp));
                    }, (error) => console.error("Reports Snapshot Error:", error));

                    unsubAttendance = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'attendance'), s => {
                        setAttendanceRecords(s.docs.map(d => ({ ...d.data(), id: d.id })).sort((a,b) => b.timestamp - a.timestamp));
                    }, (error) => console.error("Attendance Snapshot Error:", error));
                } catch (e) {
                    console.error("Snapshot Setup Error:", e);
                }

                return () => { 
                    if (unsubConfig) unsubConfig(); 
                    if (unsubReports) unsubReports(); 
                    if (unsubAttendance) unsubAttendance(); 
                };
            }, [user]);

            useEffect(() => {
                const syncData = async () => {
                    try {
                        let mText = null;
                        try {
                            mText = await fetchCSVData(csvLinkMurid); 
                        } catch (e) {
                            console.error("Error fetching student CSV:", e);
                            showToast("Gagal mengambil data Murid. Semak pautan CSV.");
                        }

                        if (mText) {
                            const mRows = parseCSV(mText);
                            let sList = []; let aSet = new Set();
                            for (let i = 1; i < mRows.length; i++) {
                                const name = (mRows[i][0] || '').trim(); const act1 = (mRows[i][1] || '').trim().toUpperCase();
                                const act2 = (mRows[i][2] || '').trim().toUpperCase(); const act3 = (mRows[i][3] || '').trim().toUpperCase();
                                if (name && name.toLowerCase() !== 'nama murid') {
                                    sList.push({ id: `S${i}`, name, act1, act2, act3 });
                                    if (act1 && act1 !== '-') aSet.add(act1); if (act2 && act2 !== '-') aSet.add(act2); if (act3 && act3 !== '-') aSet.add(act3);
                                }
                            }
                            setStudents(sList.sort((a,b) => a.name.localeCompare(b.name)));
                            if (aSet.size > 0) setActivities(Array.from(aSet).sort());
                            else setActivities(['TIADA DATA UNIT']);
                        }

                        let gText = null;
                        try {
                            gText = await fetchCSVData(csvLinkGuru); 
                        } catch (e) {
                             console.error("Error fetching teacher CSV:", e);
                             showToast("Gagal mengambil data Guru. Semak pautan CSV.");
                        }

                        if (gText) {
                            const gRows = parseCSV(gText);
                            let gList = [];
                            for (let i = 1; i < gRows.length; i++) {
                                const name = (gRows[i][0] || '').trim().toUpperCase(); if (name && name !== 'NAMA GURU') gList.push(name);
                            }
                            setTeachers(gList.sort());
                        }

                    } catch (e) { 
                        console.error("Critical Sync Error:", e); 
                        showToast("Ralat Sistem: Gagal menyegerak data asas.");
                    }
                };
                
                // Only sync if links are not the default initial placeholder
                if (csvLinkMurid && csvLinkGuru) {
                     syncData();
                }
            }, [csvLinkMurid, csvLinkGuru]);

            const LaporanForm = () => {
                const initialForm = editingReport || {
                    perjumpaan: '1', unit: activities[0] || '', tarikh: '', tajuk: '', aktiviti: '', laporanMurid: null, rumusan: '', kemahiranBerfikir: '', 
                    kataKerjaKbat: '', ulasanKbat: '', pikebm: '', disediakanOleh: '', namaDisediakan: '', ulasan1: '', ulasan2: '', ulasan3: '', ulasan4: '', ulasan5: '', ulasan6: '',
                    gambar1: null, gambar2: null, gambar3: null, gambar4: null, gambar5: null, gambar6: null
                };
                const [form, setForm] = useState(initialForm);
                const KBAT_OPTS = ['', '1. MENGAPLIKASI', '2. MENGANALISIS', '3. MENILAI', '4. MENCIPTA'];
                const VERB_OPTS = ['', '1. MENUNJUKKAN', '1. MENGAPLIKASI', '1. MENGGUNA', '1. MELENGKAP', '1. MEMBINA', '1. MENGHASIL', '2. MENGKATEGORI', '2. MENGUJI', '2. MEMBEZAKAN', '2. MEMBANDING', '2. MENTAFSIR', '3. MEMBUAT KEPUTUSAN', '3. MEMILIH', '3. MENENTUKAN', '3. MENCADANG', '3. MEMBAHAS', '3. MENILAI', '3. MEMBERI ALASAN', '4. MENCIPTA', '4. MERANCANG', '4. MENGUBAH', '4. MEREKA BENTUK', '4. MELAKAR', '4. MENGHASILKAN'];
                
                const handleFile = async (e, field) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader(); reader.onload = async (event) => { const res = await compressImage(event.target.result); setForm(prev => ({ ...prev, [field]: res })); };
                        reader.readAsDataURL(file);
                    }
                };
                const handleSubmit = async (e) => {
                    e.preventDefault();
                    try {
                        if (editingReport) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reports', editingReport.id), { ...form, timestamp: Date.now() }); showToast('Dikemaskini!'); }
                        else { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'reports'), { ...form, timestamp: Date.now(), createdBy: user.uid, eSignPenyemak: null, eSignGuru: null }); showToast('Disimpan!'); }
                        setEditingReport(null); setCurrentView('rekod_laporan');
                    } catch (err) { showToast('Ralat simpan.'); }
                };
                
                const ImageBox = ({ label, field }) => (
                    <div className="space-y-2">
                        <label className="text-[10px] font-bold text-slate-500 uppercase">{label}</label>
                        {form[field] ? (
                            <div className="relative group"><img src={form[field]} className="h-32 w-full object-cover rounded-lg border shadow-sm" /><button type="button" onClick={() => setForm({...form, [field]: null})} className="absolute top-1 right-1 bg-red-500 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs shadow-md">X</button></div>
                        ) : (
                            <label className="flex flex-col items-center justify-center h-24 border-2 border-dashed border-slate-300 rounded-lg bg-slate-50 cursor-pointer hover:bg-slate-100 transition"><span className="text-xl">📷</span><span className="text-[10px] text-slate-400 mt-1 uppercase font-bold text-center px-2">Klik Pilih Gambar</span><input type="file" accept="image/*" className="hidden" onChange={e => handleFile(e, field)} /></label>
                        )}
                    </div>
                );
                return (
                    <div className="bg-white p-4 md:p-8 rounded-2xl shadow-sm border border-slate-100 animate-in fade-in duration-500">
                        <h2 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2"><Icons.PenTool /> {editingReport ? 'Kemaskini Laporan' : 'Daftar Laporan Mingguan'}</h2>
                        <form onSubmit={handleSubmit} className="space-y-8">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-slate-50 p-4 rounded-xl text-slate-700 text-sm">
                                <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-widest">Perjumpaan</label><select className="w-full p-3 border rounded-lg outline-none bg-white font-bold" value={form.perjumpaan} onChange={e => setForm({...form, perjumpaan: e.target.value})}>{Array.from({length: 20}, (_, i) => i + 1).map(num => <option key={num} value={num}>{num}</option>)}</select></div>
                                <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-widest">Unit / Kelab</label><select className="w-full p-3 border rounded-lg outline-none bg-white font-bold" value={form.unit} onChange={e => setForm({...form, unit: e.target.value})}>{activities.map(act => <option key={act} value={act}>{act}</option>)}</select></div>
                                <div className="md:col-span-2"><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-widest">Tarikh*</label><input type="date" required className="w-full p-3 border rounded-lg outline-none bg-white font-bold" value={form.tarikh} onChange={e => setForm({...form, tarikh: e.target.value})} /></div>
                                <div className="md:col-span-2"><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-widest">Tajuk Aktiviti*</label><input type="text" required className="w-full p-3 border rounded-lg outline-none bg-white font-bold" placeholder="Contoh: Latihan Kawad Kaki" value={form.tajuk} onChange={e => setForm({...form, tajuk: e.target.value})} /></div>
                            </div>
                            <div className="space-y-4 text-sm text-slate-700">
                                <textarea rows="4" placeholder="Huraian Aktiviti*" required className="w-full p-4 border rounded-xl outline-none bg-slate-50 focus:bg-white transition" value={form.aktiviti} onChange={e => setForm({...form, aktiviti: e.target.value})} />
                                <textarea rows="3" placeholder="Rumusan / Refleksi*" required className="w-full p-4 border rounded-xl outline-none bg-slate-50 focus:bg-white transition" value={form.rumusan} onChange={e => setForm({...form, rumusan: e.target.value})} />
                            </div>
                            <ImageBox label="Laporan Murid (Lampiran)" field="laporanMurid" />
                            
                            <div className="bg-blue-50 p-5 rounded-2xl border border-blue-100 space-y-4">
                                <h3 className="font-bold text-blue-900 text-xs uppercase tracking-widest">Elemen KBAT</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <select required className="p-3 border rounded-lg bg-white text-sm font-bold text-slate-700" value={form.kemahiranBerfikir} onChange={e => setForm({...form, kemahiranBerfikir: e.target.value})}>{KBAT_OPTS.map(opt => <option key={opt} value={opt}>{opt || 'Kemahiran Berfikir'}</option>)}</select>

                    if (!isSigning || !canvasRef.current) return;

                    const getP = (e) => { const r = c.getBoundingClientRect(); let cx = e.touches ? e.touches[0].clientX : e.clientX; let cy = e.touches ? e.touches[0].clientY : e.clientY; return { x: cx - r.left, y: cy - r.top }; };
                    const m = (e) => { if (!d) return; e.preventDefault(); const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };

                        </div>
                        <div className="space-y-2 border rounded-xl p-2 divide-y">
                            {filtered.length === 0 ? <p className="p-10 text-center text-slate-400 font-bold italic uppercase tracking-widest text-[10px]">Tiada data murid untuk unit ini...</p> : filtered.map(s => (
                                <div key={s.id} onClick={()=>setAtt({...att, [s.id]: !att[s.id]})} className={`p-4 flex justify-between items-center cursor-pointer transition rounded-lg ${att[s.id] ? 'bg-green-50' : 'bg-red-50'}`}><span className="font-bold uppercase text-xs text-slate-700">{s.name}</span>{att[s.id] ? <span className="bg-green-500 text-white px-3 py-1 rounded-full text-[10px] font-black uppercase shadow-sm">Hadir</span> : <span className="bg-red-500 text-white px-3 py-1 rounded-full text-[10px] font-black uppercase shadow-sm">TH</span>}</div>
                            ))}
                        </div>
                        <button onClick={async () => { if(!tarikh) return showToast('Pilih tarikh.'); try { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'attendance'), { tarikh, aktiviti: unit, records: att, timestamp: Date.now(), createdBy: user.uid }); showToast('Disimpan!'); setCurrentView('rekod_kehadiran'); } catch(e){ showToast('Ralat.'); } }} className="mt-8 w-full py-4 bg-slate-900 text-white font-black rounded-xl shadow-lg uppercase tracking-widest hover:bg-black transition">Simpan Kehadiran ({filtered.length} Murid)</button>
                    </div>
                );
            };

            const RumusanView = () => {
                const [subTab, setSubTab] = useState('kehadiran');
                const [sel, setSel] = useState(activities[0] || '');
                const [searchQuery, setSearchQuery] = useState('');

                // 1. STATS KEHADIRAN MENGIKUT AHLI KELAB YANG DIPILIH
                const stats = useMemo(() => {
                    const list = students.filter(s => s.act1 === sel.toUpperCase() || s.act2 === sel.toUpperCase() || s.act3 === sel.toUpperCase());
                    const records = attendanceRecords.filter(r => r.aktiviti === sel);
                    return list.map(s => { 
                        let present = 0; 
                        records.forEach(r => { if (r.records && r.records[s.id]) present++; }); 
                        return { ...s, present, total: records.length }; 
                    });
                }, [students, attendanceRecords, sel]);

                const totalClubPresent = useMemo(() => stats.reduce((sum, s) => sum + s.present, 0), [stats]);
                const totalClubPossible = useMemo(() => stats.reduce((sum, s) => sum + s.total, 0), [stats]);
                const overallClubPercentage = useMemo(() => totalClubPossible > 0 ? Math.round((totalClubPresent / totalClubPossible) * 100) : 0, [totalClubPresent, totalClubPossible]);

                // 2. RUMUSAN INDIVIDU MURID BAGI KETIGA-TIGA UNIT
                const studentSummary = useMemo(() => {
                    return students.map(s => {
                        const calculateAttendanceForUnit = (unitName) => {
                            if (!unitName || unitName === '-' || unitName.trim() === '') return null;
                            const normalizedUnit = unitName.trim().toUpperCase();
                            const records = attendanceRecords.filter(r => r.aktiviti?.trim().toUpperCase() === normalizedUnit);
                            if (records.length === 0) return { pct: '-', present: 0, total: 0 };
                            
                            let present = 0;
                            records.forEach(r => {
                                if (r.records && r.records[s.id] === true) present++;
                            });
                            return {
                                pct: `${Math.round((present / records.length) * 100)}%`,
                                present,
                                total: records.length
                            };
                        };

                        return {
                            id: s.id,
                            name: s.name,
                            unit1: s.act1,
                            att1: calculateAttendanceForUnit(s.act1),
                            unit2: s.act2,
                            att2: calculateAttendanceForUnit(s.act2),
                            unit3: s.act3,
                            att3: calculateAttendanceForUnit(s.act3)
                        };
                    });
                }, [students, attendanceRecords]);

                const filteredStudentSummary = useMemo(() => {
                    if (!searchQuery) return studentSummary;
                    const normalizedQuery = searchQuery.trim().toUpperCase();
                    return studentSummary.filter(s => s.name?.toUpperCase().includes(normalizedQuery));
                }, [studentSummary, searchQuery]);

                // 3. STATS KESELURUHAN KEHADIRAN BAGI SETIAP KELAB
                const clubOverallStats = useMemo(() => {
                    return activities.filter(act => act !== 'MENGAMBIL DATA...').map(club => {
                        const enrolled = students.filter(s => s.act1 === club.toUpperCase() || s.act2 === club.toUpperCase() || s.act3 === club.toUpperCase());
                        const records = attendanceRecords.filter(r => r.aktiviti?.trim().toUpperCase() === club.trim().toUpperCase());
                        
                        let totalPossible = enrolled.length * records.length;
                        let totalPresent = 0;
                        
                        records.forEach(r => {
                            enrolled.forEach(s => {
                                if (r.records && r.records[s.id] === true) {
                                    totalPresent++;
                                }
                            });
                        });
                        
                        const percentage = totalPossible > 0 ? Math.round((totalPresent / totalPossible) * 100) : 0;
                        
                        return {
                            club,
                            memberCount: enrolled.length,
                            sessionCount: records.length,
                            totalPossible,
                            totalPresent,
                            percentage
                        };
                    });
                }, [activities, students, attendanceRecords]);

                // 4. RUMUSAN PERATUS KESELURUHAN KOKURIKULUM 2026
                const overallCoCuPercentage = useMemo(() => {
                    const clubsWithSessions = clubOverallStats.filter(c => c.sessionCount > 0);
                    if (clubsWithSessions.length === 0) return 0;
                    const sum = clubsWithSessions.reduce((acc, c) => acc + c.percentage, 0);
                    return Math.round(sum / clubsWithSessions.length);
                }, [clubOverallStats]);

                // 5. ANALISIS LAPORAN MINGGUAN
                const reportStats = useMemo(() => {
                    return activities.filter(act => act !== 'MENGAMBIL DATA...').map(club => {
                        const clubReports = reports.filter(r => r.unit === club);
                        const disemak = clubReports.filter(r => r.eSignPenyemak).length;
                        return {
                            club,
                            total: clubReports.length,
                            disemak,
                            belumDisemak: clubReports.length - disemak
                        };
                    }).sort((a, b) => b.total - a.total);
                }, [activities, reports]);

                // 6. FUNGSI CETAKAN & PDF MESRA A4 (1 MUKA SURAT)
                const handlePrint = () => {
                    const el = document.getElementById('analysis-print-area');
                    el.classList.add('single-page-print');
                    window.print();
                    el.classList.remove('single-page-print');
                };

                const handleDownloadPDF = () => {
                    const el = document.getElementById('analysis-print-area');
                    el.classList.add('single-page-print');
                    
                    const opt = { 
                        margin: 8, 
                        filename: `Analisis_${subTab.toUpperCase()}_SKPKMIRI.pdf`, 
                        image: { type: 'jpeg', quality: 0.98 }, 
                        html2canvas: { scale: 2, useCORS: true }, 
                        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
                    };
                    
                    html2pdf().from(el).set(opt).save().then(() => {
                        el.classList.remove('single-page-print');
                    });
                };

                return (
                    <div className="space-y-6 animate-in slide-in-from-right duration-500 text-slate-800">
                        {/* Sub-tab Navigation */}
                        <div className="bg-white p-2 rounded-2xl border shadow-sm grid grid-cols-2 lg:grid-cols-4 gap-2 print:hidden">
                            <button 
                                type="button"
                                onClick={() => setSubTab('kehadiran')} 
                                className={`py-3 px-4 rounded-xl text-[10px] font-black uppercase transition-all duration-200 flex items-center justify-center gap-2 ${subTab === 'kehadiran' ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'}`}
                            >
                                <Icons.Users /> Analisis Kehadiran
                            </button>
                            <button 
                                type="button"
                                onClick={() => setSubTab('rumusan_murid')} 
                                className={`py-3 px-4 rounded-xl text-[10px] font-black uppercase transition-all duration-200 flex items-center justify-center gap-2 ${subTab === 'rumusan_murid' ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'}`}
                            >
                                <Icons.ClipboardList /> Rumusan Murid
                            </button>
                            <button 
                                type="button"
                                onClick={() => setSubTab('keseluruhan')} 
                                className={`py-3 px-4 rounded-xl text-[10px] font-black uppercase transition-all duration-200 flex items-center justify-center gap-2 ${subTab === 'keseluruhan' ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'}`}
                            >
                                <Icons.PieChart /> Analisis Keseluruhan
                            </button>
                            <button 
                                type="button"
                                onClick={() => setSubTab('laporan')} 
                                className={`py-3 px-4 rounded-xl text-[10px] font-black uppercase transition-all duration-200 flex items-center justify-center gap-2 ${subTab === 'laporan' ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'}`}
                            >
                                <Icons.Archive /> Analisis Laporan
                            </button>
                        </div>

                        {/* Action Buttons for PDF/Print */}
                        <div className="flex justify-end gap-2 print:hidden">
                            <button 
                                onClick={handleDownloadPDF} 
                                className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2 shadow-md transition"
                            >
                                <Icons.Download /> Simpan PDF
                            </button>
                            <button 
                                onClick={handlePrint} 
                                className="bg-slate-800 hover:bg-slate-950 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2 shadow-md transition"
                            >
                                <Icons.Printer /> Cetak
                            </button>
                        </div>

                        {/* Printable Area */}
                        <div id="analysis-print-area" className="bg-white p-6 rounded-2xl border shadow-sm">
                            {/* Header Rasmi untuk Cetakan */}
                            <div className="hidden print:flex flex-col items-center border-b-2 border-slate-800 pb-6 mb-6">
                                <img src="logo.png" onError={(e)=>e.target.style.display='none'} className="w-24 h-24 object-contain mb-2" />
                                <h1 className="text-xl font-black uppercase tracking-widest text-slate-900">SK PENDIDIKAN KHAS MIRI</h1>
                                <h2 className="text-sm font-bold uppercase mt-2 text-slate-800">
                                    ANALISIS {
                                        subTab === 'kehadiran' ? 'KEHADIRAN MURID' :
                                        subTab === 'rumusan_murid' ? 'RUMUSAN MURID' :
                                        subTab === 'keseluruhan' ? 'KESELURUHAN' : 'LAPORAN MINGGUAN'
                                    }
                                </h2>
                                <p className="text-[9px] text-slate-400 font-bold mt-1 uppercase">Tarikh Cetakan: {formatDate(new Date().toISOString().split('T')[0])}</p>
                            </div>

                            {/* SUBTAB 1: ANALISIS KEHADIRAN GURU / KELAB */}
                            {subTab === 'kehadiran' && (
                                <div className="space-y-4">
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 print:mb-2">
                                        <div>
                                            <h2 className="text-lg font-black uppercase text-blue-600 flex items-center gap-2">
                                                <Icons.Users /> Analisis Kehadiran Murid
                                            </h2>
                                            <p className="text-[9px] text-slate-400 font-bold mt-0.5 uppercase">Rekod Kehadiran Mengikut Unit Kokurikulum</p>
                                        </div>
                                        <select 
                                            className="p-2 border rounded-xl text-xs font-bold bg-slate-50 text-slate-700 w-full sm:w-auto uppercase outline-none focus:border-blue-500 transition print:hidden" 
                                            value={sel} 
                                            onChange={e => setSel(e.target.value)}
                                        >
                                            {activities.map(a => <option key={a} value={a}>{a}</option>)}
                                        </select>
                                        <span className="hidden print:inline-block font-black text-xs text-slate-800 uppercase bg-slate-100 px-3 py-1 rounded">
                                            UNIT: {sel}
                                        </span>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-xs text-left border-collapse border-2 border-slate-800">
                                            <thead className="bg-slate-100">
                                                <tr>
                                                    <th className="p-2.5 border-2 border-slate-800 uppercase font-black text-center w-12">Bil</th>
                                                    <th className="p-2.5 border-2 border-slate-800 uppercase font-black">Nama Murid</th>
                                                    <th className="p-2.5 border-2 border-slate-800 uppercase font-black text-center w-32">Hadir / Sesi</th>
                                                    <th className="p-2.5 border-2 border-slate-800 uppercase font-black text-center w-24">% Kehadiran</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {stats.length === 0 ? (
                                                    <tr>
                                                        <td colSpan="4" className="p-8 text-center text-slate-400 font-bold italic uppercase tracking-widest text-[10px]">Tiada data kehadiran bagi unit ini...</td>
                                                    </tr>
                                                ) : (
                                                    stats.map((s, i) => { 
                                                        const perc = s.total > 0 ? Math.round((s.present / s.total) * 100) : 0; 
                                                        return (
                                                            <tr key={i} className="hover:bg-slate-50 transition">
                                                                <td className="p-2.5 border-2 border-slate-800 text-center font-bold text-slate-400">{i + 1}</td>
                                                                <td className="p-2.5 border-2 border-slate-800 font-bold uppercase text-slate-700">{s.name}</td>
                                                                <td className="p-2.5 border-2 border-slate-800 text-center font-bold text-slate-500">{s.present} / {s.total}</td>
                                                                <td className="p-2.5 border-2 border-slate-800 text-center font-black">
                                                                    <span className={`px-2 py-0.5 rounded text-xs font-black ${perc >= 80 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                                        {perc}%
                                                                    </span>
                                                                </td>
                                                            </tr>
                                                        ); 
                                                    })
                                                )}
                                                
                                                {stats.length > 0 && (
                                                    <tr className="bg-blue-50/50 font-black">
                                                        <td colSpan="2" className="p-2.5 border-2 border-slate-800 text-right uppercase text-blue-900 font-black text-xs">JUMLAH PERATUS KEHADIRAN KELAB:</td>
                                                        <td className="p-2.5 border-2 border-slate-800 text-center text-blue-900 font-bold">{totalClubPresent} / {totalClubPossible}</td>
                                                        <td className="p-2.5 border-2 border-slate-800 text-center font-black">
                                                            <span className={`px-2.5 py-0.5 rounded text-xs font-black ${overallClubPercentage >= 80 ? 'bg-green-600 text-white shadow-sm' : 'bg-red-600 text-white shadow-sm'}`}>
                                                                {overallClubPercentage}%
                                                            </span>
                                                        </td>
                                                    </tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* SUBTAB 2: PERATUS RUMUSAN GURU / MURID */}
                            {subTab === 'rumusan_murid' && (
                                <div className="space-y-4">
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 print:mb-2">
                                        <div>
                                            <h2 className="text-lg font-black uppercase text-blue-600 flex items-center gap-2">
                                                <Icons.ClipboardList /> Rumusan Peratus Kehadiran Murid
                                            </h2>
                                            <p className="text-[9px] text-slate-400 font-bold mt-0.5 uppercase">Analisis Peratusan Merangkumi Semua Unit Kokurikulum Berdaftar</p>
                                        </div>
                                        <div className="w-full sm:w-64 print:hidden">
                                            <input 
                                                type="text" 
                                                className="w-full p-2 border rounded-xl text-xs font-bold bg-slate-50 text-slate-700 uppercase outline-none focus:bg-white focus:border-blue-500 transition" 
                                                placeholder="🔍 Carian Nama Murid..." 
                                                value={searchQuery}
                                                onChange={e => setSearchQuery(e.target.value)}
                                            />
                                        </div>
                                    </div>

                                    <div className="overflow-x-auto">
                                        <table className="w-full text-xs text-left border-collapse border-2 border-slate-800">
                                            <thead className="bg-slate-100">
                                                <tr>
                                                    <th className="p-2.5 border-2 border-slate-800 uppercase font-black text-center w-12">Bil</th>
                                                    <th className="p-2.5 border-2 border-slate-800 uppercase font-black w-1/3">Nama Penuh Murid</th>
                                                    <th className="p-2.5 border-2 border-slate-800 uppercase font-black text-center">Unit 1 (Kelab)</th>
                                                    <th className="p-2.5 border-2 border-slate-800 uppercase font-black text-center">Unit 2 (Persatuan)</th>
                                                    <th className="p-2.5 border-2 border-slate-800 uppercase font-black text-center">Unit 3 (Sukan)</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {filteredStudentSummary.length === 0 ? (
                                                    <tr>
                                                        <td colSpan="5" className="p-8 text-center text-slate-400 font-bold italic uppercase tracking-widest text-[10px]">Tiada padanan nama murid ditemui...</td>
                                                    </tr>
                                                ) : (
                                                    filteredStudentSummary.map((s, idx) => (
                                                        <tr key={s.id} className="hover:bg-slate-50 transition">
                                                            <td className="p-2.5 border-2 border-slate-800 text-center font-bold text-slate-400">{idx + 1}</td>
                                                            <td className="p-2.5 border-2 border-slate-800 font-black uppercase text-slate-700">{s.name}</td>
                                                            
                                                            {/* Unit 1 */}
                                                            <td className="p-2.5 border-2 border-slate-800 text-center font-bold">
                                                                {s.att1 ? (
                                                                    <div className="space-y-0.5">
                                                                        <div className="text-[8px] uppercase text-slate-400 truncate max-w-[120px] mx-auto" title={s.unit1}>{s.unit1}</div>
                                                                        <span className={`px-2 py-0.5 rounded text-[10px] font-black ${parseInt(s.att1.pct) >= 80 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                                            {s.att1.pct}
                                                                        </span>
                                                                    </div>
                                                                ) : (
                                                                    <span className="text-slate-300">-</span>
                                                                )}
                                                            </td>

                                                            {/* Unit 2 */}
                                                            <td className="p-2.5 border-2 border-slate-800 text-center font-bold">
                                                                {s.att2 ? (
                                                                    <div className="space-y-0.5">
                                                                        <div className="text-[8px] uppercase text-slate-400 truncate max-w-[120px] mx-auto" title={s.unit2}>{s.unit2}</div>
                                                                        <span className={`px-2 py-0.5 rounded text-[10px] font-black ${parseInt(s.att2.pct) >= 80 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                                            {s.att2.pct}
                                                                        </span>
                                                                    </div>
                                                                ) : (
                                                                    <span className="text-slate-300">-</span>
                                                                )}
                                                            </td>

                                                            {/* Unit 3 */}
                                                            <td className="p-2.5 border-2 border-slate-800 text-center font-bold">
                                                                {s.att3 ? (
                                                                    <div className="space-y-0.5">
                                                                        <div className="text-[8px] uppercase text-slate-400 truncate max-w-[120px] mx-auto" title={s.unit3}>{s.unit3}</div>
                                                                        <span className={`px-2 py-0.5 rounded text-[10px] font-black ${parseInt(s.att3.pct) >= 80 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                                            {s.att3.pct}
                                                                        </span>
                                                                    </div>
                                                                ) : (
                                                                    <span className="text-slate-300">-</span>
                                                                )}
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* SUBTAB 3: ANALISIS KESELURUHAN */}
                            {subTab === 'keseluruhan' && (
                                <div className="space-y-4">
                                    {/* Dashboard Card Utama */}
                                    <div className="bg-gradient-to-r from-blue-700 to-indigo-800 text-white p-6 rounded-2xl shadow-md flex flex-col md:flex-row items-center justify-between gap-4 border border-blue-600 print:bg-none print:from-white print:to-white print:text-slate-800 print:border-2 print:border-slate-800">
                                        <div className="space-y-1 text-center md:text-left">
                                            <span className="text-[9px] bg-blue-500/30 text-blue-200 px-2 py-0.5 rounded-full font-black tracking-widest uppercase border border-blue-400/20 print:border-slate-800 print:text-slate-800">PRESTASI SEKOLAH 2026</span>
                                            <h2 className="text-lg md:text-xl font-black uppercase tracking-tight print:text-slate-900">RUMUSAN PERATUS KEHADIRAN KOKURIKULUM 2026</h2>
                                            <p className="text-[10px] text-blue-200 max-w-lg leading-relaxed uppercase print:text-slate-600">
                                                Purata Peratusan terkumpul kehadiran murid bagi keseluruhan kelab, persatuan, dan sukan berdaftar sepanjang sesi persekolahan 2026.
                                            </p>
                                        </div>
                                        <div className="bg-white/10 backdrop-blur-md p-4 rounded-xl border border-white/20 text-center min-w-[130px] flex flex-col items-center justify-center print:bg-slate-100 print:border-slate-800">
                                            <p className="text-[8px] font-black uppercase text-blue-200 tracking-wider print:text-slate-700">Kadar Kehadiran</p>
                                            <span className="text-4xl font-black my-0.5 block text-white print:text-slate-900">{overallCoCuPercentage}%</span>
                                        </div>
                                    </div>

                                    {/* Jadual Kehadiran Setiap Kelab */}
                                    <div className="space-y-2">
                                        <div>
                                            <h3 className="text-md font-black uppercase text-blue-600 flex items-center gap-2">
                                                <Icons.PieChart /> Peratus Kehadiran Mengikut Kelab / Unit
                                            </h3>
                                            <p className="text-[9px] text-slate-400 font-bold mt-0.5 uppercase">Pengiraan Komprehensif Berdasarkan Bilangan Ahli Berdaftar Dan Jumlah Sesi Kehadiran</p>
                                        </div>

                                        <div className="overflow-x-auto">
                                            <table className="w-full text-xs text-left border-collapse border-2 border-slate-800">
                                                <thead className="bg-slate-100">
                                                    <tr>
                                                        <th className="p-2.5 border-2 border-slate-800 uppercase font-black text-center w-12">Bil</th>
                                                        <th className="p-2.5 border-2 border-slate-800 uppercase font-black">Unit / Kelab</th>
                                                        <th className="p-2.5 border-2 border-slate-800 uppercase font-black text-center w-28">Ahli Berdaftar</th>
                                                        <th className="p-2.5 border-2 border-slate-800 uppercase font-black text-center w-28">Sesi Direkod</th>
                                                        <th className="p-2.5 border-2 border-slate-800 uppercase font-black text-center w-36">Jumlah Kehadiran Murid</th>
                                                        <th className="p-2.5 border-2 border-slate-800 uppercase font-black text-center w-32">Kadar Kehadiran</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {clubOverallStats.length === 0 ? (
                                                        <tr>
                                                            <td colSpan="6" className="p-8 text-center text-slate-400 font-bold italic uppercase tracking-widest text-[10px]">Tiada rekod data kelab ditemui...</td>
                                                        </tr>
                                                    ) : (
                                                        clubOverallStats.map((item, idx) => (
                                                            <tr key={idx} className="hover:bg-slate-50 transition">
                                                                <td className="p-2.5 border-2 border-slate-800 text-center font-bold text-slate-400">{idx + 1}</td>
                                                                <td className="p-2.5 border-2 border-slate-800 font-black uppercase text-slate-700">{item.club}</td>
                                                                <td className="p-2.5 border-2 border-slate-800 text-center font-bold text-slate-600">{item.memberCount} Murid</td>
                                                                <td className="p-2.5 border-2 border-slate-800 text-center font-bold text-slate-600">{item.sessionCount} Sesi</td>
                                                                <td className="p-2.5 border-2 border-slate-800 text-center font-bold text-slate-500">
                                                                    {item.sessionCount > 0 ? (
                                                                        <span>{item.totalPresent} / {item.totalPossible} slot</span>
                                                                    ) : (
                                                                        <span className="text-slate-300">-</span>
                                                                    )}
                                                                </td>
                                                                <td className="p-2.5 border-2 border-slate-800 text-center font-black">
                                                                    {item.sessionCount > 0 ? (
                                                                        <span className={`px-2 py-0.5 rounded font-black text-xs ${item.percentage >= 80 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                                            {item.percentage}%
                                                                        </span>
                                                                    ) : (
                                                                        <span className="text-[9px] font-bold text-slate-400 uppercase tracking-widest bg-slate-100 px-2 py-0.5 rounded">TIADA SESI</span>
                                                                    )}
                                                                </td>
                                                            </tr>
                                                        ))
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* SUBTAB 4: ANALISIS LAPORAN */}
                            {subTab === 'laporan' && (
                                <div className="space-y-4">
                                    <div>
                                        <h2 className="text-lg font-black uppercase text-blue-600 flex items-center gap-2">
                                            <Icons.ClipboardList /> Analisis Laporan Mingguan
                                        </h2>
                                        <p className="text-[9px] text-slate-400 font-bold mt-0.5 uppercase">Jumlah Rekod Laporan Yang Dihantar Mengikut Setiap Kelab/Unit</p>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-xs text-left border-collapse border-2 border-slate-800">
                                            <thead className="bg-slate-100">
                                                <tr>
                                                    <th className="p-2.5 border-2 border-slate-800 uppercase font-black text-center w-12">Bil</th>
                                                    <th className="p-2.5 border-2 border-slate-800 uppercase font-black">Unit / Kelab Co-Kurikulum</th>
                                                    <th className="p-2.5 border-2 border-slate-800 uppercase font-black text-center w-36">Belum Disemak</th>
                                                    <th className="p-2.5 border-2 border-slate-800 uppercase font-black text-center w-32">Telah Disemak</th>
                                                    <th className="p-2.5 border-2 border-slate-800 uppercase font-black text-center w-32 bg-blue-50/50">Jumlah Laporan</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {reportStats.length === 0 ? (
                                                    <tr>
                                                        <td colSpan="5" className="p-8 text-center text-slate-400 font-bold italic uppercase tracking-widest text-[10px]">Tiada rekod laporan ditemui...</td>
                                                    </tr>
                                                ) : (
                                                    reportStats.map((item, idx) => (
                                                        <tr key={idx} className="hover:bg-slate-50 transition">
                                                            <td className="p-2.5 border-2 border-slate-800 text-center font-bold text-slate-400">{idx + 1}</td>
                                                            <td className="p-2.5 border-2 border-slate-800 font-black uppercase text-slate-700">{item.club}</td>
                                                            <td className="p-2.5 border-2 border-slate-800 text-center font-bold">
                                                                <span className={`px-2 py-0.5 rounded text-xs font-black ${item.belumDisemak > 0 ? 'bg-orange-100 text-orange-700' : 'bg-slate-100 text-slate-400'}`}>
                                                                    {item.belumDisemak}
                                                                </span>
                                                            </td>
                                                            <td className="p-2.5 border-2 border-slate-800 text-center font-bold">
                                                                <span className={`px-2 py-0.5 rounded text-xs font-black ${item.disemak > 0 ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-400'}`}>
                                                                    {item.disemak}
                                                                </span>
                                                            </td>
                                                            <td className="p-2.5 border-2 border-slate-800 text-center font-black bg-blue-50/20 text-blue-700 text-sm">
                                                                {item.total}
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* Ruangan Pengesahan Kosong Semasa Cetakan */}
                            <div className="hidden print:flex justify-between mt-12 px-12 text-center text-[10px] font-black break-inside-avoid">
                                <div className="w-56 border-t border-slate-800 pt-2 uppercase">Disediakan Oleh:<br/><span className="text-slate-400">(Setiausaha Kokurikulum)</span></div>
                                <div className="w-56 border-t border-slate-800 pt-2 uppercase">Disahkan Oleh:<br/><span className="text-slate-400">(Penolong Kanan Kokurikulum)</span></div>
                            </div>
                            
                            <div className="hidden print:block mt-12 pt-4 border-t-2 border-slate-800 text-center text-[10px] font-black uppercase text-slate-600 break-inside-avoid">
                                UNIT KOKURIKULUM SK PENDIDIKAN KHAS MIRI
                            </div>
                        </div>
                    </div>
                );
            };

            const TetapanData = () => {
                const [links, setLinks] = useState({ murid: csvLinkMurid, guru: csvLinkGuru });
                return (
                    <div className="bg-white p-6 border-2 border-slate-100 rounded-2xl shadow-sm space-y-6 text-slate-700 animate-in slide-in-from-bottom duration-500">
                        <h2 className="text-xl font-black uppercase flex items-center gap-2 text-slate-700"><Icons.Settings /> Integrasi Google Sheets</h2>
                        <div className="space-y-4">
                            <div><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Pautan CSV Murid (Sheet 1)</label><input className="w-full p-4 border rounded-xl text-xs font-mono bg-slate-50 focus:bg-white outline-none" value={links.murid} onChange={e=>setLinks({...links, murid: e.target.value})} /></div>
                            <div><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Pautan CSV Guru (Sheet 2)</label><input className="w-full p-4 border rounded-xl text-xs font-mono bg-slate-50 focus:bg-white outline-none" value={links.guru} onChange={e=>setLinks({...links, guru: e.target.value})} /></div>
                            <button onClick={async () => { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config'), { csvLinkMurid: links.murid, csvLinkGuru: links.guru }); showToast('Dikemaskini!'); }} className="w-full py-4 bg-slate-900 text-white font-black rounded-xl uppercase tracking-widest shadow-xl hover:bg-black transition">Kemaskini Pangkalan Data</button>
                        </div>
                    </div>
                );
            };

            if (isLoading) return <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white font-bold tracking-widest uppercase"><div className="text-6xl mb-6 animate-pulse">🚀</div><div className="text-center p-4"><h2 className="text-sm font-black mb-2 tracking-[0.2em]">Memuatkan Sistem eKoku Live</h2><p className="text-[9px] text-blue-400 font-bold opacity-80 uppercase text-blue-100">SK Pendidikan Khas Miri</p></div></div>;

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col max-w-[100vw] overflow-x-hidden border-t-8 border-blue-600">
                    {toast && <div className="fixed top-4 right-4 bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl z-[1000] font-bold text-xs animate-slide-in">{toast}</div>}
                    <header className="bg-slate-900 text-slate-300 print:hidden sticky top-0 z-50 shadow-2xl">
                        <div className="px-6 py-4 flex justify-between items-center border-b border-white/5">
                            <div><h1 className="text-xl font-black tracking-tighter leading-none flex items-center gap-2 uppercase">eKOKU <span className="text-[10px] bg-green-500 text-white px-2 py-0.5 rounded-full font-black animate-pulse uppercase tracking-widest">Live</span></h1><p className="text-[10px] font-bold opacity-40 tracking-[0.2em] mt-1.5 uppercase text-blue-100">SK Pendidikan Khas Miri</p></div>
                            <div className="hidden md:flex text-[10px] font-black text-blue-400 bg-blue-400/10 px-3 py-1 rounded-full border border-blue-400/20 uppercase tracking-widest">SISTEM REKOD KOKURIKULUM</div>
                        </div>
                        <nav className="p-1 grid grid-cols-3 md:grid-cols-6 gap-1 bg-white/5 backdrop-blur-md">
                            {Object.entries({
                                laporan_baru: { label: editingReport ? 'Kemaskini' : 'Borang', icon: Icons.PenTool },
                                rekod_laporan: { label: 'Laporan', icon: Icons.Archive },
                                kehadiran_baru: { label: 'Hadir', icon: Icons.Users },
                                rekod_kehadiran: { label: 'Senarai', icon: Icons.ClipboardList },
                                rumusan: { label: 'Analisis', icon: Icons.PieChart },
                                tetapan: { label: 'Set', icon: Icons.Settings }
                            }).map(([id, item]) => (
                                <button key={id} onClick={() => { if(id !== 'laporan_baru') setEditingReport(null); setCurrentView(id); }} className={`flex flex-col items-center p-2 rounded-xl transition-all duration-300 ${currentView === id ? 'bg-blue-600 text-white shadow-lg scale-95' : 'text-slate-400 hover:bg-white/10 hover:text-white'}`}><item.icon /><span className="text-[9px] mt-1.5 font-bold uppercase tracking-tighter text-center">{item.label}</span></button>
                            ))}
                        </nav>
                    </header>
                    <main className="flex-1 p-4 md:p-8 max-w-7xl mx-auto w-full mb-20">
                        {currentView === 'laporan_baru' && <LaporanForm />}
                        {currentView === 'rekod_laporan' && <RekodLaporan />}
                        {currentView === 'kehadiran_baru' && <KehadiranForm />}
                        {currentView === 'rekod_kehadiran' && <KehadiranView />}
                        {currentView === 'rumusan' && <RumusanView />}
                        {currentView === 'tetapan' && <TetapanData />}
                    </main>
                    <footer className="p-10 text-center border-t border-slate-100 print:hidden bg-white/50 text-slate-400 uppercase font-black text-[11px] tracking-widest">Sistem eKoku Digital &copy; 2024 SKPK MIRI</footer>
                </div>
            );
        }
        const r = ReactDOM.createRoot(document.getElementById('root')); r.render(<App />);
    </script>
</body>
</html>
